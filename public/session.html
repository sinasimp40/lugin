<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Session</title>
<style>
  @font-face {
    font-family: 'Orbitron';
    font-style: normal;
    font-weight: 400 900;
    font-display: swap;
    src: local('Orbitron'), url('fonts/orbitron.woff2') format('woff2');
    unicode-range: U+0000-00FF;
  }
  @font-face {
    font-family: 'Share Tech Mono';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: local('Share Tech Mono'), url('fonts/share-tech-mono.woff2') format('woff2');
    unicode-range: U+0000-00FF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }

  .strip {
    width: 100%; height: 100%;
    display: flex; align-items: center;
    padding: 0 14px;
    background: linear-gradient(180deg, #0d0d0d 0%, #080808 100%);
    border-radius: 4px;
    border: 1px solid rgba(255,140,0,0.12);
    border-bottom: 2px solid #ff8c00;
    -webkit-app-region: drag; cursor: move;
    position: relative; overflow: hidden;
  }

  .neon-line {
    position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent 0%, #ff8c00 15%, #ffb347 50%, #ff8c00 85%, transparent 100%);
    box-shadow: 0 0 8px rgba(255,140,0,0.6), 0 0 20px rgba(255,140,0,0.3);
    z-index: 2;
  }

  .neon-glow {
    position: absolute; bottom: 0; left: 10%; right: 10%; height: 12px;
    background: radial-gradient(ellipse at bottom, rgba(255,140,0,0.15), transparent 70%);
    pointer-events: none; z-index: 1;
  }

  .sweep {
    position: absolute; top: 0; left: -60%; width: 40%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,140,0,0.02), rgba(255,140,0,0.04), rgba(255,140,0,0.02), transparent);
    animation: sweep 4s ease-in-out infinite;
    pointer-events: none; z-index: 1;
  }
  @keyframes sweep { 0% { left: -40%; } 100% { left: 140%; } }

  .scanline {
    position: absolute; inset: 0; pointer-events: none; z-index: 1;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,140,0,0.01) 2px, rgba(255,140,0,0.01) 4px);
  }

  .left-section {
    display: flex; flex-direction: column; gap: 2px;
    flex: 1; min-width: 0;
    position: relative; z-index: 3;
  }

  .timer {
    font-family: 'Orbitron', monospace;
    font-size: 22px; font-weight: 700;
    color: #ff8c00;
    letter-spacing: 2px; line-height: 1;
    text-shadow: 0 0 10px rgba(255,140,0,0.4), 0 0 25px rgba(255,140,0,0.15);
    white-space: nowrap;
  }
  .timer.critical {
    color: #ff2200;
    text-shadow: 0 0 12px rgba(255,34,0,0.7), 0 0 30px rgba(255,34,0,0.4);
    animation: critical-flash 0.5s ease-in-out infinite;
  }
  @keyframes critical-flash {
    0%, 100% { opacity: 1; text-shadow: 0 0 12px rgba(255,34,0,0.7), 0 0 30px rgba(255,34,0,0.4); }
    50% { opacity: 0.3; text-shadow: 0 0 20px rgba(255,34,0,1), 0 0 40px rgba(255,0,0,0.6); }
  }

  .user-row {
    display: flex; align-items: center; gap: 5px;
  }

  .status-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: #22cc44;
    box-shadow: 0 0 4px rgba(34,204,68,0.6), 0 0 8px rgba(34,204,68,0.3);
    flex-shrink: 0;
    animation: dot-pulse 2s ease-in-out infinite;
  }
  @keyframes dot-pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 4px rgba(34,204,68,0.6), 0 0 8px rgba(34,204,68,0.3); }
    50% { opacity: 0.6; box-shadow: 0 0 2px rgba(34,204,68,0.3); }
  }

  .user {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: rgba(255,140,0,0.7);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 150px; letter-spacing: 1px;
    text-shadow: 0 0 4px rgba(255,140,0,0.2);
  }

  .right-section {
    flex-shrink: 0;
    margin-left: 12px;
    position: relative; z-index: 3;
  }

  .logout-btn {
    -webkit-app-region: no-drag;
    background: transparent;
    border: 1px solid rgba(255,140,0,0.3);
    color: #ff8c00; padding: 5px 14px;
    border-radius: 2px; cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    transition: all 0.3s;
    position: relative; overflow: hidden;
  }
  .logout-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,140,0,0.08), transparent);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }
  .logout-btn:hover {
    background: rgba(255,140,0,0.1);
    border-color: rgba(255,140,0,0.6);
    box-shadow: 0 0 10px rgba(255,140,0,0.2), inset 0 0 10px rgba(255,140,0,0.05);
  }
  .logout-btn:hover::before { transform: translateX(100%); }

  .strip.danger-mode .neon-line {
    background: linear-gradient(90deg, transparent 0%, #ff2200 15%, #ff4400 50%, #ff2200 85%, transparent 100%);
    box-shadow: 0 0 8px rgba(255,34,0,0.6), 0 0 20px rgba(255,34,0,0.3);
    animation: neon-danger-pulse 0.8s ease-in-out infinite;
  }
  @keyframes neon-danger-pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(255,34,0,0.6), 0 0 20px rgba(255,34,0,0.3); }
    50% { opacity: 0.5; box-shadow: 0 0 15px rgba(255,34,0,0.9), 0 0 35px rgba(255,0,0,0.5); }
  }
  .strip.danger-mode .neon-glow {
    background: radial-gradient(ellipse at bottom, rgba(255,34,0,0.2), transparent 70%);
  }
  .strip.danger-mode {
    border-color: rgba(255,34,0,0.2);
    border-bottom-color: #ff2200;
    animation: strip-danger-flash 1s ease-in-out infinite;
  }
  @keyframes strip-danger-flash {
    0%, 100% { box-shadow: inset 0 0 8px rgba(255,34,0,0.03); }
    50% { box-shadow: inset 0 0 20px rgba(255,34,0,0.08), 0 0 12px rgba(255,34,0,0.2); }
  }
  .strip.danger-mode .status-dot {
    background: #ff2200;
    box-shadow: 0 0 4px rgba(255,34,0,0.6), 0 0 8px rgba(255,34,0,0.3);
    animation: dot-danger 0.5s ease-in-out infinite;
  }
  @keyframes dot-danger {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .strip.danger-mode .user { color: rgba(255,34,0,0.6); }
  .strip.danger-mode .logout-btn {
    border-color: rgba(255,34,0,0.4);
    color: #ff2200;
  }
</style>
</head>
<body>
  <div class="strip" id="strip">
    <div class="scanline"></div>
    <div class="sweep"></div>
    <div class="neon-line"></div>
    <div class="neon-glow"></div>
    <div class="left-section">
      <div class="timer" id="timer">--:--:--</div>
      <div class="user-row">
        <div class="status-dot" id="status-dot"></div>
        <div class="user" id="username">User</div>
      </div>
    </div>
    <div class="right-section">
      <button class="logout-btn" id="logout-btn">LOGOUT</button>
    </div>
  </div>

  <script>
    let timeLeft = 0;
    let interval = null;
    let logoutLink = '';
    let sessionUsername = '';
    let sessionIp = '';
    let sessionMac = '';
    let ws = null;
    let wsReconnectTimer = null;

    function connectWs() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws/session`);
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'status' && msg.data) {
            if (msg.data.isLogin) {
              document.getElementById('username').textContent = msg.data.username || 'User';
              timeLeft = parseInt(msg.data.sessionTimeLeft) || 0;
              if (msg.data.logoutLink) logoutLink = msg.data.logoutLink;
              if (msg.data.username) sessionUsername = msg.data.username;
              if (msg.data.ip) sessionIp = msg.data.ip;
              if (msg.data.mac) sessionMac = msg.data.mac;
              updateTimer();
            }
          } else if (msg.type === 'logged-out') {
            if (window.electronAPI && window.electronAPI.setSessionState) {
              window.electronAPI.setSessionState('logged-out');
            }
          }
        } catch (e) {}
      };
      ws.onclose = () => { ws = null; wsReconnectTimer = setTimeout(connectWs, 3000); };
      ws.onerror = () => { if (ws) ws.close(); };
    }

    async function loadStatus() {
      try {
        const resp = await fetch('/api/hotspot/status');
        const data = await resp.json();
        if (data.success && data.data && data.data.isLogin) {
          document.getElementById('username').textContent = data.data.username || 'User';
          timeLeft = parseInt(data.data.sessionTimeLeft) || 0;
          if (data.data.logoutLink) logoutLink = data.data.logoutLink;
          if (data.data.username) sessionUsername = data.data.username;
          if (data.data.ip) sessionIp = data.data.ip;
          if (data.data.mac) sessionMac = data.data.mac;
          updateTimer();
        }
      } catch (e) {}
    }

    const sessionTickAudio = new Audio('sounds/tick.wav');
    const sessionWarnAudio = new Audio('sounds/warn-tick.wav');
    const sessionUrgentAudio = new Audio('sounds/urgent-tick.wav');
    const sessionFinalAudio = new Audio('sounds/final-beep.wav');
    [sessionTickAudio, sessionWarnAudio, sessionUrgentAudio, sessionFinalAudio].forEach(a => { a.volume = 0.8; });
    let lastTickedSession = -1;
    function playSessionTick(n) {
      if (n === lastTickedSession) return;
      lastTickedSession = n;
      try {
        let audio;
        if (n <= 3) audio = sessionFinalAudio;
        else if (n <= 10) audio = sessionUrgentAudio;
        else if (n <= 20) audio = sessionWarnAudio;
        else audio = sessionTickAudio;
        audio.currentTime = 0;
        audio.play().catch(() => {});
      } catch (e) {}
    }

    function updateTimer() {
      const el = document.getElementById('timer');
      const strip = document.getElementById('strip');
      const d = Math.floor(timeLeft / 86400);
      const h = Math.floor((timeLeft % 86400) / 3600);
      const m = Math.floor((timeLeft % 3600) / 60);
      const s = timeLeft % 60;
      el.textContent = d > 0
        ? d + 'd ' + String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0')
        : String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
      el.className = 'timer';
      strip.classList.remove('danger-mode');
      if (timeLeft <= 60) {
        el.classList.add('critical');
        strip.classList.add('danger-mode');
        if (timeLeft > 0) playSessionTick(timeLeft);
      }
    }

    async function doLogout() {
      document.getElementById('logout-btn').disabled = true;
      document.getElementById('logout-btn').textContent = '...';
      const isMember = sessionUsername && sessionUsername.startsWith('mem-');

      try {
        await fetch('/api/pisonet/logout', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ ip: sessionIp, mac: sessionMac, username: sessionUsername })
        });
      } catch(e) { console.log('[session] pisonet/logout error:', e.message); }

      if (!isMember && logoutLink) {
        try {
          const eraseUrl = logoutLink + (logoutLink.includes('?') ? '&' : '?') + 'erase-cookie=on';
          const iframe = document.createElement('iframe');
          iframe.style.display = 'none';
          iframe.src = eraseUrl;
          document.body.appendChild(iframe);
          await new Promise(r => setTimeout(r, 3000));
          try { document.body.removeChild(iframe); } catch(_) {}
        } catch(e) { console.log('[session] mikrotik iframe logout error:', e.message); }
      }

      try { await fetch('/api/session/trigger', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({action: 'logged-out'}) }); } catch(e) {}
    }

    document.getElementById('logout-btn').addEventListener('click', (e) => { e.preventDefault(); doLogout(); });

    loadStatus();
    connectWs();
    interval = setInterval(() => { if (timeLeft > 0) { timeLeft--; updateTimer(); } }, 1000);
  </script>
</body>
</html>
