<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Session</title>
<style>
  @font-face {
    font-family: 'Orbitron';
    font-style: normal;
    font-weight: 400 900;
    font-display: swap;
    src: local('Orbitron'), url('fonts/orbitron.woff2') format('woff2');
    unicode-range: U+0000-00FF;
  }
  @font-face {
    font-family: 'Share Tech Mono';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: local('Share Tech Mono'), url('fonts/share-tech-mono.woff2') format('woff2');
    unicode-range: U+0000-00FF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }

  .box {
    width: 100%; height: 100%;
    padding: 8px 14px;
    display: flex; flex-direction: column; justify-content: center; gap: 4px;
    background: linear-gradient(135deg, #0a0a0a 0%, #111 50%, #0a0a0a 100%);
    border-radius: 4px;
    border: 1px solid rgba(255,140,0,0.15);
    -webkit-app-region: drag; cursor: move;
    position: relative; overflow: hidden;
  }

  .glow-border {
    position: absolute; inset: -1px; border-radius: 5px; pointer-events: none; z-index: 0;
    background: conic-gradient(from var(--angle, 0deg), transparent 0%, rgba(255,140,0,0.4) 10%, transparent 20%, transparent 45%, rgba(255,69,0,0.3) 55%, transparent 65%, transparent 90%, rgba(255,200,0,0.3) 100%);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask-composite: exclude; -webkit-mask-composite: xor;
    padding: 1px;
    animation: border-spin 4s linear infinite;
  }
  @property --angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }
  @keyframes border-spin {
    to { --angle: 360deg; }
  }

  .corner { position: absolute; width: 8px; height: 8px; pointer-events: none; z-index: 2; }
  .corner::before, .corner::after {
    content: ''; position: absolute; background: #ff8c00;
    box-shadow: 0 0 4px rgba(255,140,0,0.6);
  }
  .corner-tl { top: 2px; left: 2px; }
  .corner-tl::before { top: 0; left: 0; width: 8px; height: 1px; }
  .corner-tl::after { top: 0; left: 0; width: 1px; height: 8px; }
  .corner-tr { top: 2px; right: 2px; }
  .corner-tr::before { top: 0; right: 0; width: 8px; height: 1px; }
  .corner-tr::after { top: 0; right: 0; width: 1px; height: 8px; }
  .corner-bl { bottom: 2px; left: 2px; }
  .corner-bl::before { bottom: 0; left: 0; width: 8px; height: 1px; }
  .corner-bl::after { bottom: 0; left: 0; width: 1px; height: 8px; }
  .corner-br { bottom: 2px; right: 2px; }
  .corner-br::before { bottom: 0; right: 0; width: 8px; height: 1px; }
  .corner-br::after { bottom: 0; right: 0; width: 1px; height: 8px; }

  .scanline {
    position: absolute; inset: 0; pointer-events: none; z-index: 1;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,140,0,0.015) 2px, rgba(255,140,0,0.015) 4px);
  }

  .sweep {
    position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,140,0,0.03), rgba(255,140,0,0.06), rgba(255,140,0,0.03), transparent);
    animation: sweep 3s ease-in-out infinite;
    pointer-events: none; z-index: 1;
  }
  @keyframes sweep { 0% { left: -60%; } 100% { left: 160%; } }

  .top-line {
    position: absolute; top: 0; height: 1px; pointer-events: none; z-index: 2;
    background: linear-gradient(90deg, transparent, rgba(255,140,0,0.5), transparent);
    animation: line-move 2.5s ease-in-out infinite alternate;
  }
  @keyframes line-move {
    0% { left: 5%; right: 60%; }
    100% { left: 60%; right: 5%; }
  }

  .timer {
    font-family: 'Orbitron', monospace;
    font-size: 20px; font-weight: 700;
    color: #ff8c00; text-align: center;
    letter-spacing: 3px; line-height: 1;
    text-shadow: 0 0 10px rgba(255,140,0,0.5), 0 0 25px rgba(255,140,0,0.2);
    position: relative; z-index: 3;
  }
  .timer.warning {
    color: #ffd700;
    text-shadow: 0 0 10px rgba(255,215,0,0.6), 0 0 25px rgba(255,215,0,0.2);
  }
  .timer.critical {
    color: #ff2200;
    text-shadow: 0 0 12px rgba(255,34,0,0.7), 0 0 30px rgba(255,34,0,0.4);
    animation: timer-pulse 0.8s ease-in-out infinite;
  }
  .timer.danger {
    color: #ff4500;
    text-shadow: 0 0 10px rgba(255,69,0,0.6), 0 0 25px rgba(255,69,0,0.3);
    animation: timer-pulse 1s ease-in-out infinite;
  }
  @keyframes timer-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  .box.danger-border { border-color: rgba(255,34,0,0.4); }
  .box.danger-border .corner::before,
  .box.danger-border .corner::after {
    background: #ff2200;
    box-shadow: 0 0 6px rgba(255,34,0,0.8);
  }
  .box.danger-border .glow-border {
    background: conic-gradient(from var(--angle, 0deg), transparent 0%, rgba(255,34,0,0.5) 10%, transparent 20%, transparent 45%, rgba(255,0,0,0.4) 55%, transparent 65%, transparent 90%, rgba(255,50,0,0.4) 100%);
  }
  .box.danger-border .user { color: rgba(255,34,0,0.5); }
  .box.danger-border .logout-btn {
    border-color: rgba(255,34,0,0.4);
    color: #ff2200;
  }

  .bottom {
    display: flex; align-items: center; justify-content: space-between;
    position: relative; z-index: 3;
  }
  .user {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: rgba(255,140,0,0.4);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px;
    letter-spacing: 1px;
  }
  .logout-btn {
    -webkit-app-region: no-drag;
    background: rgba(255,140,0,0.06);
    border: 1px solid rgba(255,140,0,0.25);
    color: #ff8c00; padding: 3px 12px;
    border-radius: 2px; cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    transition: all 0.3s;
    position: relative; overflow: hidden;
  }
  .logout-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,140,0,0.1), transparent);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }
  .logout-btn:hover {
    background: rgba(255,140,0,0.15);
    border-color: rgba(255,140,0,0.5);
    box-shadow: 0 0 12px rgba(255,140,0,0.2), inset 0 0 12px rgba(255,140,0,0.05);
  }
  .logout-btn:hover::before { transform: translateX(100%); }

  canvas#particles {
    position: absolute; inset: 0; pointer-events: none; z-index: 1;
  }
</style>
</head>
<body>
  <div class="box">
    <div class="glow-border"></div>
    <div class="scanline"></div>
    <div class="sweep"></div>
    <div class="top-line"></div>
    <canvas id="particles"></canvas>
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div class="timer" id="timer">--:--:--</div>
    <div class="bottom">
      <div class="user" id="username">User</div>
      <button class="logout-btn" id="logout-btn">Logout</button>
    </div>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('particles');
      const ctx = canvas.getContext('2d');
      const dots = [];
      function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
      resize();
      window.addEventListener('resize', resize);

      function spawnDot() {
        return {
          x: Math.random() * canvas.width,
          y: canvas.height + 2,
          vy: -(0.15 + Math.random() * 0.25),
          vx: (Math.random() - 0.5) * 0.1,
          size: 0.5 + Math.random() * 1,
          life: 120 + Math.random() * 100,
          maxLife: 0,
          r: 255,
          g: Math.round(120 + Math.random() * 80),
          b: 0
        };
      }

      function animateDots() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (dots.length < 15) {
          const d = spawnDot();
          d.maxLife = d.life;
          dots.push(d);
        }
        for (let i = dots.length - 1; i >= 0; i--) {
          const d = dots[i];
          d.life--;
          if (d.life <= 0) { dots.splice(i, 1); continue; }
          d.x += d.vx;
          d.y += d.vy;
          const progress = 1 - (d.life / d.maxLife);
          let alpha = progress < 0.1 ? progress / 0.1 : (progress > 0.5 ? (1 - progress) / 0.5 : 0.6);
          ctx.fillStyle = 'rgba(' + d.r + ',' + d.g + ',' + d.b + ',' + alpha + ')';
          ctx.beginPath();
          ctx.arc(d.x, d.y, d.size * 0.4, 0, Math.PI * 2);
          ctx.fill();
        }
        requestAnimationFrame(animateDots);
      }
      animateDots();
    })();

    let timeLeft = 0;
    let interval = null;
    let logoutLink = '';
    let sessionUsername = '';
    let sessionIp = '';
    let sessionMac = '';
    let ws = null;
    let wsReconnectTimer = null;

    function connectWs() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws/session`);
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'status' && msg.data) {
            if (msg.data.isLogin) {
              document.getElementById('username').textContent = msg.data.username || 'User';
              timeLeft = parseInt(msg.data.sessionTimeLeft) || 0;
              if (msg.data.logoutLink) logoutLink = msg.data.logoutLink;
              if (msg.data.username) sessionUsername = msg.data.username;
              if (msg.data.ip) sessionIp = msg.data.ip;
              if (msg.data.mac) sessionMac = msg.data.mac;
              updateTimer();
            }
          } else if (msg.type === 'logged-out') {
            if (window.electronAPI && window.electronAPI.setSessionState) {
              window.electronAPI.setSessionState('logged-out');
            }
          }
        } catch (e) {}
      };
      ws.onclose = () => { ws = null; wsReconnectTimer = setTimeout(connectWs, 3000); };
      ws.onerror = () => { if (ws) ws.close(); };
    }

    async function loadStatus() {
      try {
        const resp = await fetch('/api/hotspot/status');
        const data = await resp.json();
        if (data.success && data.data && data.data.isLogin) {
          document.getElementById('username').textContent = data.data.username || 'User';
          timeLeft = parseInt(data.data.sessionTimeLeft) || 0;
          if (data.data.logoutLink) logoutLink = data.data.logoutLink;
          if (data.data.username) sessionUsername = data.data.username;
          if (data.data.ip) sessionIp = data.data.ip;
          if (data.data.mac) sessionMac = data.data.mac;
          updateTimer();
        }
      } catch (e) {}
    }

    const sessionTickAudio = new Audio('sounds/tick.wav');
    const sessionWarnAudio = new Audio('sounds/warn-tick.wav');
    const sessionUrgentAudio = new Audio('sounds/urgent-tick.wav');
    const sessionFinalAudio = new Audio('sounds/final-beep.wav');
    [sessionTickAudio, sessionWarnAudio, sessionUrgentAudio, sessionFinalAudio].forEach(a => { a.volume = 0.8; });
    let lastTickedSession = -1;
    function playSessionTick(n) {
      if (n === lastTickedSession) return;
      lastTickedSession = n;
      try {
        let audio;
        if (n <= 3) audio = sessionFinalAudio;
        else if (n <= 10) audio = sessionUrgentAudio;
        else if (n <= 20) audio = sessionWarnAudio;
        else audio = sessionTickAudio;
        audio.currentTime = 0;
        audio.play().catch(() => {});
      } catch (e) {}
    }

    function updateTimer() {
      const el = document.getElementById('timer');
      const box = document.querySelector('.box');
      const d = Math.floor(timeLeft / 86400);
      const h = Math.floor((timeLeft % 86400) / 3600);
      const m = Math.floor((timeLeft % 3600) / 60);
      const s = timeLeft % 60;
      el.textContent = d > 0
        ? d + 'd ' + String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0')
        : String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
      el.className = 'timer';
      box.classList.remove('danger-border');
      if (timeLeft <= 60) {
        el.classList.add('critical');
        box.classList.add('danger-border');
        if (timeLeft > 0) playSessionTick(timeLeft);
      } else if (timeLeft <= 300) {
        el.classList.add('danger');
        box.classList.add('danger-border');
      }
    }

    async function doLogout() {
      document.getElementById('logout-btn').disabled = true;
      document.getElementById('logout-btn').textContent = '...';
      const isMember = sessionUsername && sessionUsername.startsWith('mem-');

      try {
        await fetch('/api/pisonet/logout', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ ip: sessionIp, mac: sessionMac, username: sessionUsername })
        });
      } catch(e) { console.log('[session] pisonet/logout error:', e.message); }

      if (!isMember && logoutLink) {
        try {
          const eraseUrl = logoutLink + (logoutLink.includes('?') ? '&' : '?') + 'erase-cookie=on';
          const iframe = document.createElement('iframe');
          iframe.style.display = 'none';
          iframe.src = eraseUrl;
          document.body.appendChild(iframe);
          await new Promise(r => setTimeout(r, 3000));
          try { document.body.removeChild(iframe); } catch(_) {}
        } catch(e) { console.log('[session] mikrotik iframe logout error:', e.message); }
      }

      try { await fetch('/api/session/trigger', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({action: 'logged-out'}) }); } catch(e) {}
    }

    document.getElementById('logout-btn').addEventListener('click', (e) => { e.preventDefault(); doLogout(); });

    loadStatus();
    connectWs();
    interval = setInterval(() => { if (timeLeft > 0) { timeLeft--; updateTimer(); } }, 1000);
  </script>
</body>
</html>
