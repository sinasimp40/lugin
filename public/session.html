<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Session</title>
<style>
  @font-face {
    font-family: 'Orbitron';
    font-style: normal;
    font-weight: 400 900;
    font-display: swap;
    src: local('Orbitron'), url('fonts/orbitron.woff2') format('woff2');
    unicode-range: U+0000-00FF;
  }
  @font-face {
    font-family: 'Share Tech Mono';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: local('Share Tech Mono'), url('fonts/share-tech-mono.woff2') format('woff2');
    unicode-range: U+0000-00FF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }

  .strip {
    width: 100%; height: 100%;
    display: flex; align-items: center;
    padding: 0 12px;
    background: linear-gradient(180deg, #0d0d0d 0%, #080808 100%);
    border-radius: 3px;
    border: none;
    border-left: 2px solid #ff8c00;
    border-right: 2px solid #ff8c00;
    -webkit-app-region: drag; cursor: move;
    position: relative; overflow: hidden;
    transition: border-color 0.3s;
  }

  .neon-line-left, .neon-line-right {
    position: absolute; top: 0; bottom: 0; width: 2px;
    background: linear-gradient(180deg, transparent 0%, #ff8c00 20%, #ffb347 50%, #ff8c00 80%, transparent 100%);
    box-shadow: 0 0 6px rgba(255,140,0,0.5), 0 0 15px rgba(255,140,0,0.25);
    z-index: 2;
  }
  .neon-line-left { left: 0; }
  .neon-line-right { right: 0; }

  .neon-glow-left, .neon-glow-right {
    position: absolute; top: 10%; bottom: 10%; width: 10px;
    pointer-events: none; z-index: 1;
  }
  .neon-glow-left {
    left: 0;
    background: radial-gradient(ellipse at left, rgba(255,140,0,0.12), transparent 70%);
  }
  .neon-glow-right {
    right: 0;
    background: radial-gradient(ellipse at right, rgba(255,140,0,0.12), transparent 70%);
  }

  .sweep {
    position: absolute; top: 0; left: -60%; width: 40%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,140,0,0.02), rgba(255,140,0,0.05), rgba(255,140,0,0.02), transparent);
    animation: sweep 3s ease-in-out infinite;
    pointer-events: none; z-index: 1;
  }
  @keyframes sweep { 0% { left: -40%; } 100% { left: 140%; } }

  .scanline {
    position: absolute; inset: 0; pointer-events: none; z-index: 1;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,140,0,0.012) 2px, rgba(255,140,0,0.012) 4px);
  }

  canvas#bg-anim {
    position: absolute; inset: 0; pointer-events: none; z-index: 0;
    width: 100%; height: 100%;
  }

  .left-section {
    display: flex; flex-direction: column; gap: 1px;
    flex: 1; min-width: 0;
    position: relative; z-index: 3;
  }

  .timer {
    font-family: 'Orbitron', monospace;
    font-size: 14px; font-weight: 700;
    color: #ff8c00;
    letter-spacing: 1px; line-height: 1;
    text-shadow: 0 0 8px rgba(255,140,0,0.4), 0 0 20px rgba(255,140,0,0.15);
    white-space: nowrap;
  }
  .timer.critical {
    color: #ff2200;
    text-shadow: 0 0 10px rgba(255,34,0,0.7), 0 0 25px rgba(255,34,0,0.4);
    animation: critical-flash 0.5s ease-in-out infinite;
  }
  @keyframes critical-flash {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }

  .user-row {
    display: flex; align-items: center; gap: 4px;
  }

  .status-dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: #22cc44;
    box-shadow: 0 0 3px rgba(34,204,68,0.6), 0 0 6px rgba(34,204,68,0.3);
    flex-shrink: 0;
    animation: dot-pulse 2s ease-in-out infinite;
  }
  @keyframes dot-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .user {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px; color: rgba(255,140,0,0.7);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    max-width: 80px; letter-spacing: 0.5px;
    text-shadow: 0 0 4px rgba(255,140,0,0.2);
  }
  .pc-label {
    font-family: 'Orbitron', monospace;
    font-size: 6px; font-weight: 700;
    color: rgba(255,140,0,0.5);
    letter-spacing: 1px;
    text-shadow: 0 0 4px rgba(255,140,0,0.15);
    white-space: nowrap;
    display: none;
  }
  .pc-label.active { display: block; }

  .right-section {
    flex-shrink: 0;
    margin-left: 6px;
    position: relative; z-index: 3;
  }

  .logout-btn {
    -webkit-app-region: no-drag;
    background: transparent;
    border: 1px solid rgba(255,140,0,0.3);
    color: #ff8c00; padding: 3px 8px;
    border-radius: 2px; cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    font-size: 7px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    transition: all 0.3s;
    position: relative; overflow: hidden;
  }
  .logout-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,140,0,0.1), transparent);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }
  .logout-btn:hover {
    background: rgba(255,140,0,0.12);
    border-color: rgba(255,140,0,0.6);
    box-shadow: 0 0 8px rgba(255,140,0,0.2);
  }
  .logout-btn:hover::before { transform: translateX(100%); }

  .strip.danger-mode {
    border-left: 2px solid #ff2200;
    border-right: 2px solid #ff2200;
    animation: strip-danger 1s ease-in-out infinite;
  }
  @keyframes strip-danger {
    0%, 100% { box-shadow: inset 0 0 6px rgba(255,34,0,0.03); }
    50% { box-shadow: inset 0 0 15px rgba(255,34,0,0.1), 0 0 10px rgba(255,34,0,0.25); }
  }
  .strip.danger-mode .neon-line-left,
  .strip.danger-mode .neon-line-right {
    background: linear-gradient(180deg, transparent 0%, #ff2200 20%, #ff4400 50%, #ff2200 80%, transparent 100%);
    box-shadow: 0 0 8px rgba(255,34,0,0.6), 0 0 20px rgba(255,34,0,0.3);
    animation: neon-danger 0.8s ease-in-out infinite;
  }
  @keyframes neon-danger {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(255,34,0,0.6), 0 0 20px rgba(255,34,0,0.3); }
    50% { opacity: 0.4; box-shadow: 0 0 15px rgba(255,34,0,0.9), 0 0 30px rgba(255,0,0,0.5); }
  }
  .strip.danger-mode .neon-glow-left {
    background: radial-gradient(ellipse at left, rgba(255,34,0,0.2), transparent 70%);
  }
  .strip.danger-mode .neon-glow-right {
    background: radial-gradient(ellipse at right, rgba(255,34,0,0.2), transparent 70%);
  }
  .strip.danger-mode .status-dot {
    background: #ff2200;
    box-shadow: 0 0 4px rgba(255,34,0,0.6);
    animation: dot-danger 0.5s ease-in-out infinite;
  }
  @keyframes dot-danger {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }
  .strip.danger-mode .user { color: rgba(255,34,0,0.7); }
  .strip.danger-mode .logout-btn {
    border-color: rgba(255,34,0,0.4);
    color: #ff2200;
  }
  .strip.danger-mode .sweep {
    background: linear-gradient(90deg, transparent, rgba(255,34,0,0.03), rgba(255,34,0,0.06), rgba(255,34,0,0.03), transparent);
  }
</style>
</head>
<body>
  <div class="strip" id="strip">
    <canvas id="bg-anim"></canvas>
    <div class="scanline"></div>
    <div class="sweep"></div>
    <div class="neon-line-left"></div>
    <div class="neon-line-right"></div>
    <div class="neon-glow-left"></div>
    <div class="neon-glow-right"></div>
    <div class="left-section">
      <div class="timer" id="timer">--:--:--</div>
      <div class="user-row">
        <div class="status-dot" id="status-dot"></div>
        <div class="user" id="username">User</div>
        <div class="pc-label" id="pc-label"></div>
      </div>
    </div>
    <div class="right-section">
      <button class="logout-btn" id="logout-btn">LOGOUT</button>
    </div>
  </div>

  <script>
    (function() {
      const c = document.getElementById('bg-anim');
      const ctx = c.getContext('2d');
      let isDanger = false;
      function resize() { c.width = c.offsetWidth; c.height = c.offsetHeight; }
      resize();
      window.addEventListener('resize', resize);

      const particles = [];
      const GRID_SPACING = 12;
      let offset = 0;

      function drawGrid() {
        const r = isDanger ? 255 : 255;
        const g = isDanger ? 34 : 140;
        const b = isDanger ? 0 : 0;
        ctx.strokeStyle = `rgba(${r},${g},${b},0.03)`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        for (let x = (offset % GRID_SPACING); x < c.width; x += GRID_SPACING) {
          ctx.moveTo(x, 0); ctx.lineTo(x, c.height);
        }
        for (let y = 0; y < c.height; y += GRID_SPACING) {
          ctx.moveTo(0, y); ctx.lineTo(c.width, y);
        }
        ctx.stroke();
      }

      function spawnParticle() {
        return {
          x: -2,
          y: Math.random() * c.height,
          vx: 0.3 + Math.random() * 0.5,
          size: 0.5 + Math.random() * 1,
          alpha: 0.1 + Math.random() * 0.3,
          trail: []
        };
      }

      function animate() {
        ctx.clearRect(0, 0, c.width, c.height);
        offset += 0.15;
        drawGrid();

        isDanger = document.getElementById('strip').classList.contains('danger-mode');
        const r = isDanger ? 255 : 255;
        const g = isDanger ? 50 : 160;
        const b = isDanger ? 0 : 0;

        if (particles.length < 6 && Math.random() < 0.03) {
          particles.push(spawnParticle());
        }

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx;
          p.trail.push({ x: p.x, y: p.y });
          if (p.trail.length > 8) p.trail.shift();

          for (let t = 0; t < p.trail.length; t++) {
            const tp = p.trail[t];
            const ta = (t / p.trail.length) * p.alpha * 0.3;
            ctx.fillStyle = `rgba(${r},${g},${b},${ta})`;
            ctx.fillRect(tp.x - p.size * 0.3, tp.y - p.size * 0.3, p.size * 0.6, p.size * 0.6);
          }

          ctx.fillStyle = `rgba(${r},${g},${b},${p.alpha})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * 0.5, 0, Math.PI * 2);
          ctx.fill();

          if (p.x > c.width + 5) particles.splice(i, 1);
        }

        requestAnimationFrame(animate);
      }
      animate();

      window._setBgDanger = (v) => { isDanger = v; };
    })();

    let timeLeft = 0;
    let interval = null;
    let logoutLink = '';
    let sessionUsername = '';
    let sessionIp = '';
    let sessionMac = '';
    let ws = null;
    let wsReconnectTimer = null;
    let autoLogoutTriggered = false;
    let checkingExpiry = false;

    async function checkExpiryLogout() {
      if (timeLeft > 0 || autoLogoutTriggered || checkingExpiry) return;
      checkingExpiry = true;
      for (let attempt = 0; attempt < 3; attempt++) {
        try {
          const resp = await fetch('/api/hotspot/status').then(r => r.json());
          if (resp && resp.success && resp.data && resp.data.isLogin) {
            const serverTime = parseInt(resp.data.sessionTimeLeft) || 0;
            if (serverTime > 0) {
              console.log('[session] Server still has time:', serverTime, '- aborting auto-logout (coin was added?)');
              timeLeft = serverTime;
              if (resp.data.logoutLink) logoutLink = resp.data.logoutLink;
              updateTimer();
              checkingExpiry = false;
              return;
            }
          }
          break;
        } catch (e) {
          console.log('[session] Server check attempt', attempt + 1, 'failed, retrying...');
          if (attempt < 2) await new Promise(r => setTimeout(r, 1000));
        }
      }
      checkingExpiry = false;
      autoLogoutTriggered = true;
      console.log('[session] Timer expired and server confirmed, triggering auto-logout');
      doLogout();
    }

    function connectWs() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws/session`);
      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'status' && msg.data) {
            if (msg.data.isLogin) {
              document.getElementById('username').textContent = msg.data.username || 'User';
              const newTime = parseInt(msg.data.sessionTimeLeft) || 0;
              if (timeLeft > 0 && newTime > timeLeft + 2) {
                coinSuccessAudio.currentTime = 0;
                coinSuccessAudio.play().catch(() => {});
              }
              timeLeft = newTime;
              if (newTime > 0) autoLogoutTriggered = false;
              if (msg.data.logoutLink) logoutLink = msg.data.logoutLink;
              if (msg.data.username) sessionUsername = msg.data.username;
              if (msg.data.ip) sessionIp = msg.data.ip;
              if (msg.data.mac) sessionMac = msg.data.mac;
              if (msg.data.units && msg.data.ip && msg.data.units[msg.data.ip]) {
                setPcLabel(msg.data.units[msg.data.ip]);
              }
              updateTimer();
              checkExpiryLogout();
            }
          } else if (msg.type === 'logged-out') {
            if (window.electronAPI && window.electronAPI.setSessionState) {
              window.electronAPI.setSessionState('logged-out');
            }
          }
        } catch (e) {}
      };
      ws.onclose = () => { ws = null; wsReconnectTimer = setTimeout(connectWs, 3000); };
      ws.onerror = () => { if (ws) ws.close(); };
    }

    function setPcLabel(name) {
      if (!name) return;
      const el = document.getElementById('pc-label');
      el.textContent = '[ ' + name + ' ]';
      el.classList.add('active');
    }

    async function loadStatus() {
      try {
        const resp = await fetch('/api/hotspot/status');
        const data = await resp.json();
        if (data.success && data.data && data.data.isLogin) {
          document.getElementById('username').textContent = data.data.username || 'User';
          const newTime = parseInt(data.data.sessionTimeLeft) || 0;
          if (timeLeft > 0 && newTime > timeLeft + 2) {
            coinSuccessAudio.currentTime = 0;
            coinSuccessAudio.play().catch(() => {});
          }
          timeLeft = newTime;
          if (newTime > 0) autoLogoutTriggered = false;
          if (data.data.logoutLink) logoutLink = data.data.logoutLink;
          if (data.data.username) sessionUsername = data.data.username;
          if (data.data.ip) sessionIp = data.data.ip;
          if (data.data.mac) sessionMac = data.data.mac;
          if (data.data.units && data.data.ip && data.data.units[data.data.ip]) {
            setPcLabel(data.data.units[data.data.ip]);
          }
          updateTimer();
          checkExpiryLogout();
        }
      } catch (e) {}
    }

    const coinSuccessAudio = new Audio('sounds/coin-success.mp3');
    coinSuccessAudio.volume = 0.9;

    const sessionTickAudio = new Audio('sounds/tick.wav');
    const sessionWarnAudio = new Audio('sounds/warn-tick.wav');
    const sessionUrgentAudio = new Audio('sounds/urgent-tick.wav');
    const sessionFinalAudio = new Audio('sounds/final-beep.wav');
    [sessionTickAudio, sessionWarnAudio, sessionUrgentAudio, sessionFinalAudio].forEach(a => { a.volume = 0.8; });
    let lastTickedSession = -1;
    function playSessionTick(n) {
      if (n === lastTickedSession) return;
      lastTickedSession = n;
      try {
        let audio;
        if (n <= 3) audio = sessionFinalAudio;
        else if (n <= 10) audio = sessionUrgentAudio;
        else if (n <= 20) audio = sessionWarnAudio;
        else audio = sessionTickAudio;
        audio.currentTime = 0;
        audio.play().catch(() => {});
      } catch (e) {}
    }

    function updateTimer() {
      const el = document.getElementById('timer');
      const strip = document.getElementById('strip');
      const d = Math.floor(timeLeft / 86400);
      const h = Math.floor((timeLeft % 86400) / 3600);
      const m = Math.floor((timeLeft % 3600) / 60);
      const s = timeLeft % 60;
      el.textContent = d > 0
        ? d + 'd ' + String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0')
        : String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
      el.className = 'timer';
      strip.classList.remove('danger-mode');
      if (timeLeft <= 60) {
        el.classList.add('critical');
        strip.classList.add('danger-mode');
        if (timeLeft > 0) playSessionTick(timeLeft);
      }
    }

    async function doLogout() {
      document.getElementById('logout-btn').disabled = true;
      document.getElementById('logout-btn').textContent = '...';
      const isMember = sessionUsername && sessionUsername.startsWith('mem-');

      try {
        await fetch('/api/pisonet/logout', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ ip: sessionIp, mac: sessionMac, username: sessionUsername })
        });
      } catch(e) { console.log('[session] pisonet/logout error:', e.message); }

      if (!isMember && logoutLink) {
        try {
          const eraseUrl = logoutLink + (logoutLink.includes('?') ? '&' : '?') + 'erase-cookie=on';
          const iframe = document.createElement('iframe');
          iframe.style.display = 'none';
          iframe.src = eraseUrl;
          document.body.appendChild(iframe);
          await new Promise(r => setTimeout(r, 3000));
          try { document.body.removeChild(iframe); } catch(_) {}
        } catch(e) { console.log('[session] mikrotik iframe logout error:', e.message); }
      }

      try { await fetch('/api/session/trigger', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({action: 'logged-out'}) }); } catch(e) {}
    }

    document.getElementById('logout-btn').addEventListener('click', (e) => { e.preventDefault(); doLogout(); });

    loadStatus();
    connectWs();
    interval = setInterval(() => {
      if (timeLeft > 0) {
        timeLeft--;
        updateTimer();
        if (timeLeft <= 0) checkExpiryLogout();
      }
    }, 1000);
  </script>
</body>
</html>
