<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Router Settings</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">
  <div class="auth-container wider">
    <div class="logo-area">
      <div class="logo-icon">&#9881;</div>
      <h1>Router Settings</h1>
      <p class="subtitle">Connect to your MikroTik RB4011</p>
    </div>

    <div id="status-bar" class="status-bar hidden"></div>

    <form id="settings-form" class="form-card">
      <div class="form-group">
        <label>Router IP Address</label>
        <input type="text" id="router-host" placeholder="192.168.88.1" autocomplete="off" />
        <div class="field-hint">The LAN IP of your MikroTik router</div>
      </div>
      <div class="form-group">
        <label>RouterOS API Port</label>
        <input type="number" id="router-port" placeholder="8728" value="8728" />
        <div class="field-hint">Enable at IP &gt; Services &gt; API (port 8728)</div>
      </div>
      <div class="form-group">
        <label>API Admin Username</label>
        <input type="text" id="router-user" placeholder="admin" autocomplete="off" />
        <div class="field-hint">A router user with full or write access</div>
      </div>
      <div class="form-group">
        <label>API Admin Password</label>
        <input type="password" id="router-password" placeholder="Router admin password" />
      </div>

      <div class="settings-actions">
        <button type="button" class="btn btn-outline" id="test-btn">
          <span id="test-text">&#128279; Test</span>
          <span id="test-spinner" class="spinner hidden"></span>
        </button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>

    <div id="test-result" class="settings-result hidden"></div>

    <div class="auth-links" style="justify-content:center">
      <a href="#" id="go-back">&#8592; Back to Login</a>
    </div>
  </div>
  <script src="js/settings.js"></script>
</body>
</html>
