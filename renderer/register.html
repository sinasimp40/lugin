<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - MikroTik Hotspot</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">
  <div class="auth-container wider">
    <div class="logo-area">
      <div class="logo-icon">&#9889;</div>
      <h1>Create Account</h1>
      <p class="subtitle">Register as Hotspot Member</p>
    </div>

    <div id="status-bar" class="status-bar hidden"></div>

    <form id="register-form" class="form-card">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Choose a username" autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Choose a password" />
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Repeat password" />
      </div>
      <div class="form-group">
        <label>Profile <span class="hint">(optional)</span></label>
        <select id="profile">
          <option value="default">default</option>
        </select>
      </div>
      <div class="form-group">
        <label>Time Limit <span class="hint">(e.g. 1h, 30m, 2h30m)</span></label>
        <input type="text" id="limit-uptime" placeholder="Leave blank for unlimited" autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Note / Comment <span class="hint">(optional)</span></label>
        <input type="text" id="comment" placeholder="e.g. Room 101" autocomplete="off" />
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="register-btn">
        <span id="btn-text">Create Account</span>
        <span id="btn-spinner" class="spinner hidden"></span>
      </button>
    </form>

    <div class="auth-links">
      <a href="#" id="go-login">&#8592; Back to Login</a>
    </div>
  </div>

  <script src="js/register.js"></script>
</body>
</html>
