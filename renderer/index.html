<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MikroTik Hotspot Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="logo-area">
      <div class="logo-icon">&#9889;</div>
      <h1>MikroTik Hotspot</h1>
      <p class="subtitle">Member Login Portal</p>
    </div>

    <div id="status-bar" class="status-bar hidden"></div>

    <form id="login-form" class="form-card">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="off" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" />
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn">
        <span id="btn-text">Login &amp; Connect</span>
        <span id="btn-spinner" class="spinner hidden"></span>
      </button>
    </form>

    <div class="auth-links">
      <span>New member? <a href="#" id="go-register">Register here</a></span>
      <a href="#" id="go-settings" class="admin-link">&#9881; Settings</a>
    </div>

    <div class="config-hint hidden" id="config-hint">
      &#9888; Router not configured —
      <a href="#" id="go-settings">click Settings first</a>
    </div>
  </div>
  <script src="js/login.js"></script>
</body>
</html>
